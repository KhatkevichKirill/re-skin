services:
  redis:
    image: redis:7-alpine
    container_name: re-skin-redis
    restart: unless-stopped
    # No host port: Redis is reachable only on the internal docker network
    # (worker/api connect by service name). Exposing 6379 publicly is a known
    # RCE/abuse vector — keep it internal.
    expose:
      - "6379"
    # Require a password (defense-in-depth; the port is already internal-only).
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: re-skin-api
    restart: unless-stopped
    # Cap RAM so a runaway request can't drag the host into swap-thrash.
    mem_limit: 1g
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --log-level info
    # No host port: the API has NO auth of its own (basic auth lives in nginx).
    # Only nginx (:8847) is public; nginx reaches the API on the docker network.
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      # Ensure relative paths in config.py resolve against WORKDIR /app
      APP_BASE_DIR: /app
      # Override DATA_DIR to the absolute mount point so api + worker agree
      DATA_DIR: /app/data
      PYTHONUNBUFFERED: "1"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # Shared persistent data: SQLite DB + per-job clips/results
      - ./data:/app/data
      # Service-account JSON for Google Drive (read-only)
      - ./secrets:/app/secrets:ro
      # Persist the downloaded InsightFace model (~280MB) across recreates
      - insightface-models:/root/.insightface
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: re-skin-worker
    restart: unless-stopped
    # Hard RAM cap: InsightFace + ffmpeg can spike; if a job exceeds this the
    # container is OOM-killed (and restarted) instead of freezing the whole host.
    mem_limit: 2560m
    # mem_swap == mem_limit → no swap for this container, so a runaway job is
    # killed promptly rather than thrashing swap and hanging SSH.
    memswap_limit: 2560m
    # Leave ~0.5 of the 2 host cores free so a full-CPU x264 stitch/encode can't
    # starve SSH / the api. Applied live via `docker update` on running jobs.
    cpus: 1.5
    # python -m worker.worker — PYTHONPATH=/app means `from app.tasks import ...`
    # resolves correctly because app/ and worker/ are both under /app.
    command: python -m worker.worker
    env_file:
      - .env
    environment:
      APP_BASE_DIR: /app
      DATA_DIR: /app/data
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # Same bind mount as api — required for shared SQLite DB and clip files
      - ./data:/app/data
      # Service-account JSON for Google Drive (read-only)
      - ./secrets:/app/secrets:ro
      # Persist the downloaded InsightFace model (~280MB) across recreates
      - insightface-models:/root/.insightface
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    build:
      context: ./deploy/nginx
      dockerfile: Dockerfile
    container_name: re-skin-nginx
    restart: unless-stopped
    ports:
      - "${APP_EXTERNAL_PORT:-8847}:8847"
    env_file:
      - .env
    depends_on:
      - api
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  insightface-models:
