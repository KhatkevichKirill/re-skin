version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: re-skin-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: re-skin-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: re-skin-worker
    command: python -m worker.worker
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  nginx:
    build:
      context: ./deploy/nginx
      dockerfile: Dockerfile
    container_name: re-skin-nginx
    ports:
      - "${APP_EXTERNAL_PORT:-8847}:8847"
    env_file:
      - .env
    depends_on:
      - api
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
