services:
  db:
    image: postgres:16-alpine
    container_name: re-skin-db
    restart: unless-stopped
    # No host port: Postgres is reachable only on the internal docker network
    # (api/worker connect by service name "db"). Exposing 5432 publicly is a
    # security risk — keep it internal, matching the redis pattern.
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: re-skin-redis
    restart: unless-stopped
    # No host port: Redis is reachable only on the internal docker network
    # (worker/api connect by service name). Exposing 6379 publicly is a known
    # RCE/abuse vector — keep it internal.
    expose:
      - "6379"
    # Require a password (defense-in-depth; the port is already internal-only).
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: re-skin-api
    restart: unless-stopped
    # Cap RAM so a runaway request can't drag the host into swap-thrash.
    mem_limit: 2g
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --log-level info
    # No host port: the API has NO auth of its own (basic auth lives in nginx).
    # Only nginx (:8847) is public; nginx reaches the API on the docker network.
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      # Ensure relative paths in config.py resolve against WORKDIR /app
      APP_BASE_DIR: /app
      # Override DATA_DIR to the absolute mount point so api + worker agree
      DATA_DIR: /app/data
      PYTHONUNBUFFERED: "1"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    volumes:
      # Shared persistent data: media files (SQLite DB no longer stored here when using Postgres)
      - ./data:/app/data
      # Service-account JSON for Google Drive (read-only)
      - ./secrets:/app/secrets:ro
      # Persist the downloaded InsightFace model (~280MB) across recreates
      - insightface-models:/root/.insightface
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # SCALING NOTE: container_name is intentionally omitted so that
    # `docker-compose up --scale worker=N` (or compose deploy.replicas) works.
    # A fixed container_name prevents Docker from launching more than one
    # instance of a service — removing it enables N named replicas
    # (re-skin_worker_1, re-skin_worker_2, …).
    #
    # To run 2 workers:
    #   docker-compose up -d --scale worker=2
    # or set WORKER_REPLICAS=2 in .env and use the deploy section (swarm mode).
    #
    # RESOURCE BUDGET (4 vCPU / 16 GiB host):
    #   postgres:   ~0.5 vCPU  / 0.5 GiB
    #   redis:      ~0.1 vCPU  / 0.1 GiB
    #   api:        ~0.5 vCPU  / 2.0 GiB (mem_limit above)
    #   nginx:      ~0.1 vCPU  / 0.1 GiB
    #   2×worker:   2×2.0 vCPU / 2×6.0 GiB  ← sized below
    #   ─────────────────────────────────────
    #   TOTAL:      ~5.2 vCPU peak / ~14.7 GiB
    #   headroom:   ~0.8 GiB / ~1.3 vCPU (host OS + burst)
    #
    # With N=2 workers: each worker gets cpus=2.0 / mem_limit=6g.
    # A single 1080p stitch uses 2-4 GiB; InsightFace analyze uses ~2 GiB.
    # 6g per worker is a safe ceiling for the current workload.
    # DO NOT raise N beyond 2 on this host without cutting cpus/mem further.
    restart: unless-stopped
    mem_limit: 6g
    memswap_limit: 7g
    cpus: "2.0"
    # python -m worker.worker — PYTHONPATH=/app means `from app.tasks import ...`
    # resolves correctly because app/ and worker/ are both under /app.
    command: python -m worker.worker
    env_file:
      - .env
    environment:
      APP_BASE_DIR: /app
      DATA_DIR: /app/data
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      # 2 ffmpeg threads per worker keeps per-process memory bounded while
      # allowing up to STITCH_CUT_CONCURRENCY parallel cut_clip calls.
      FFMPEG_THREADS: "2"
      # Parallel cut_clip calls during stitch assembly (keep + fallback segments).
      # Default 2: two ffmpeg cuts run simultaneously per worker. Safe on cpus=2.0.
      STITCH_CUT_CONCURRENCY: "2"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    volumes:
      # Same bind mount as api — required for shared clip/result files
      - ./data:/app/data
      # Service-account JSON for Google Drive (read-only)
      - ./secrets:/app/secrets:ro
      # Persist the downloaded InsightFace model (~280MB) across recreates
      - insightface-models:/root/.insightface
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    build:
      context: ./deploy/nginx
      dockerfile: Dockerfile
    container_name: re-skin-nginx
    restart: unless-stopped
    ports:
      - "${APP_EXTERNAL_PORT:-8847}:8847"
    env_file:
      - .env
    depends_on:
      - api
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  insightface-models:
  postgres-data:
